<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="g" cx="30%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#ff9a7a"/>
      <stop offset="55%" stop-color="#ff7a59"/>
      <stop offset="100%" stop-color="#7a3b2a"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity=".04"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="#0b0b10"/>
  <circle cx="256" cy="288" r="176" fill="none" stroke="url(#ring)" stroke-width="6"/>
  <circle cx="256" cy="288" r="176" fill="none" stroke="url(#g)" stroke-width="22"
          stroke-dasharray="905 1105" stroke-linecap="round" transform="rotate(-90 256 288)"/>
  <!-- clock face -->
  <g stroke="#ffffff" stroke-linecap="round" stroke-width="14" fill="none" opacity=".95">
    <line x1="256" y1="288" x2="256" y2="180"/>
    <line x1="256" y1="288" x2="338" y2="312"/>
    <circle cx="256" cy="288" r="10" fill="#ffffff"/>
  </g>
  <!-- top knob -->
  <rect x="216" y="76" width="80" height="34" rx="12" fill="#ff7a59"/>
  <rect x="236" y="58" width="40" height="22" rx="6" fill="#ffb499"/>
</svg>
